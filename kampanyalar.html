<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Herbalife - Kampanyalar</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/commerce.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f0f0f;color:#eee;}
header{display:flex;align-items:center;justify-content:space-between;padding:20px 60px;background:rgba(0,0,0,0.75);border-bottom:2px solid rgba(212,175,55,0.3);}
.logo{font-size:28px;color:#D4AF37;}
.menu-btn{font-size:26px;color:#D4AF37;cursor:pointer;}
nav{display:flex;align-items:center;gap:15px;}
nav a{text-decoration:none;color:#ddd;}
nav a:hover,nav a.active{color:#D4AF37;}
.cart-phone{display:flex;align-items:center;gap:10px;}
.cart-icon{position:relative;color:#D4AF37;cursor:pointer;text-decoration:none;}
#cartCount{position:absolute;top:-8px;right:-12px;background:red;color:#fff;border-radius:50%;padding:3px 7px;font-size:12px;}
#cartCount.bump{transform:scale(1.4);transition:0.2s;}
.search{display:block;margin:20px auto;padding:10px 20px;border-radius:25px;border:1px solid #444;background:#000;color:#fff;width:60%;}
.side-menu{position:fixed;top:0;right:-300px;width:260px;height:100%;background:#111;padding:30px;transition:0.4s;z-index:1000;display:flex;flex-direction:column;gap:20px;}
.side-menu.active{right:0;}
.side-menu a{color:#ddd;text-decoration:none;font-size:18px;}
.side-menu a:hover{color:#D4AF37;}
.close-btn{font-size:20px;cursor:pointer;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;}
.overlay.active{display:block;}
.banner{width:90%;margin:40px auto;height:280px;border-radius:20px;overflow:hidden;position:relative;}
.slider img{position:absolute;width:100%;height:100%;object-fit:cover;opacity:0;transition:1s;}
.slider img.active{opacity:1;}
.banner::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.45);}
.banner-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:36px;color:#fff;z-index:2;white-space:nowrap;}
.banner span{color:#D4AF37;}
.products{width:90%;margin:0 auto 40px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}
.card{background:#1a1a1a;padding:16px;border-radius:15px;text-align:center;border:1px solid rgba(212,175,55,0.1);position:relative;}
.card::before{content:'🔥 Kampanya';position:absolute;top:10px;left:10px;background:#D4AF37;color:#000;font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;}
.card img{width:100%;height:180px;object-fit:cover;border-radius:10px;}
.card-img-placeholder{width:100%;height:180px;background:#111;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:48px;}
.card h3{margin:10px 0 4px;font-size:15px;color:#fff;}
.card .desc{font-size:12px;color:#888;margin-bottom:6px;}
.price{color:#D4AF37;margin:6px 0 4px;font-weight:600;}
.card .barcode-tag{font-family:'Courier New',monospace;font-size:10px;color:#666;letter-spacing:1px;margin-bottom:6px;}
.card .colors-row{display:flex;justify-content:center;gap:5px;margin-bottom:8px;flex-wrap:wrap;}
.color-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);display:inline-block;}
.add-cart-btn{background:#D4AF37;border:none;padding:9px 20px;border-radius:20px;cursor:pointer;transition:0.3s;color:#000;font-size:13px;font-weight:600;width:100%;margin-top:4px;}
#toast{position:fixed;top:20px;right:20px;background:#111;color:#fff;padding:12px 20px;border-radius:10px;opacity:0;transform:translateY(-20px);transition:0.4s;border:1px solid rgba(212,175,55,0.3);z-index:9999;}
#toast.show{opacity:1;transform:translateY(0);}
footer{margin-top:60px;padding:20px;text-align:center;background:#080808;color:#555;}
@media(max-width:680px){header,.products{padding:16px;width:100%;}.search{width:90%;}}
</style>
</head>
<body>

<header>
  <div class="menu-btn" onclick="openMenu()">☰</div>
  <div class="logo">Herbalife</div>
  <nav>
    <a href="index.html">Ana Sayfa</a>
    <a href="urunler.html">Ürünler</a>
    <a href="kampanyalar.html" class="active">Kampanyalar</a>
    <a href="hakkimizda.html">Hakkımızda</a>
    <a href="iletisim.html">İletişim</a>
    <a href="satici-paneli.html">Satıcı Panelim</a>
    <div class="cart-phone">
      <a href="sepetim.html" class="cart-icon">🛒 <span id="cartCount">0</span></a>
      <span style="color:#D4AF37;font-weight:600;">📞 0 555 123 45 67</span>
    </div>
  </nav>
</header>

<div class="side-menu" id="sideMenu">
  <div class="close-btn" onclick="closeMenu()">✖</div>
  <a href="index.html">Ana Sayfa</a>
  <a href="urunler.html">Ürünler</a>
  <a href="kampanyalar.html">Kampanyalar</a>
  <a href="hakkimizda.html">Hakkımızda</a>
  <a href="iletisim.html">İletişim</a>
  <a href="satici-paneli.html">Satıcı Panelim</a>
  <a href="sepetim.html">🛒 Sepetim</a>
</div>
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<input class="search" type="text" placeholder="Kampanya ara..." oninput="filterProducts(this.value)">

<div class="banner">
  <div class="slider">
    <img src="https://picsum.photos/900/400?1" class="active">
    <img src="https://picsum.photos/900/400?2">
    <img src="https://picsum.photos/900/400?3">
  </div>
  <div class="banner-text">%30 <span>Luxury İndirim</span></div>
</div>

<div class="products" id="productsGrid"></div>

<footer>© 2026 Herbalife</footer>
<div id="toast"></div>

<script>
const AUTH_STORAGE_KEY = 'sp_seller_auth';

function safeParse(key,fallback){try{const v=localStorage.getItem(key);return v?JSON.parse(v):fallback;}catch(e){localStorage.removeItem(key);return fallback;}}
function openMenu(){document.getElementById('sideMenu').classList.add('active');document.getElementById('overlay').classList.add('active');}
function closeMenu(){document.getElementById('sideMenu').classList.remove('active');document.getElementById('overlay').classList.remove('active');}
function showToast(text){let t=document.getElementById('toast');t.innerText=text;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function updateCartCount(){let cart=safeParse('cart',[]);let el=document.getElementById('cartCount');if(el){el.innerText=cart.length;el.classList.add('bump');setTimeout(()=>el.classList.remove('bump'),200);}}

let slides=document.querySelectorAll('.slider img');let sidx=0;
if(slides.length)setInterval(()=>{slides[sidx].classList.remove('active');sidx=(sidx+1)%slides.length;slides[sidx].classList.add('active');},3000);

const allProducts=safeParse('sp_products',[]);
const pageProducts=allProducts.filter(p=>p.target==='kampanyalar'||p.target==='hepsi');
let currentProducts = pageProducts;

function getCatEmoji(cat){return{'Takı':'💍','Giyim':'👕','Elektronik':'📱','Aksesuar':'👜'}[cat]||'📦';}

function buildCard(p,i){
  const imgHtml=p.img?`<img src="${p.img}" alt="${p.name}" onerror="this.style.display='none'">`:`<div class="card-img-placeholder">${getCatEmoji(p.cat)}</div>`;
  const colorsHtml=(p.colors&&p.colors.length)?`<div class="colors-row">${p.colors.map(c=>`<span class="color-dot" style="background:${c.hex};" title="${c.name}"></span>`).join('')}</div>`:'';
  const barcodeHtml=p.barcode?`<div class="barcode-tag">🔢 ${p.barcode}</div>`:'';
  return `<div class="card" data-index="${i}">${imgHtml}<h3>${p.name}</h3>${p.desc?`<div class="desc">${p.desc.slice(0,60)}</div>`:''}<div class="price">₺${Number(p.price).toLocaleString('tr-TR')}</div>${barcodeHtml}${colorsHtml}<button class="add-cart-btn" onclick="addToCart(${i},this)">Sepete Ekle</button></div>`;
}

function renderProductGrid(list){
  const grid=document.getElementById('productsGrid');
  currentProducts = list;
  grid.innerHTML=list.length?list.map((p,i)=>buildCard(p,i)).join(''):'<p style="color:#bbb;text-align:center;padding:40px 0;width:100%;">Kampanya ürünü bulunamadı.</p>';
}
function filterProducts(q){renderProductGrid(pageProducts.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())));}

function addToCart(idx,btn){
  const p=currentProducts[idx];if(!p)return;
  let cart=safeParse('cart',[]);
  cart.push({name:p.name,price:p.price,img:p.img||'',barcode:p.barcode||null,colors:p.colors||[],cat:p.cat});
  localStorage.setItem('cart',JSON.stringify(cart));
  updateCartCount();
  const card=btn.closest('.card');const imgEl=card.querySelector('img');
  if(imgEl){
    let fi=imgEl.cloneNode(true);let rect=imgEl.getBoundingClientRect();
    fi.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;z-index:9999;border-radius:10px;transition:all 0.7s cubic-bezier(.65,-0.3,.35,1.5);pointer-events:none;`;
    document.body.appendChild(fi);
    let ci=document.querySelector('.cart-icon');let cr=ci.getBoundingClientRect();
    setTimeout(()=>{fi.style.left=cr.left+'px';fi.style.top=cr.top+'px';fi.style.width='30px';fi.style.height='30px';fi.style.opacity=0;},10);
    setTimeout(()=>fi.remove(),750);
  }
  btn.innerText='✓ Eklendi';btn.style.background='#4CAF50';
  setTimeout(()=>{btn.innerText='Sepete Ekle';btn.style.background='var(--site-primary)';},1200);
  showToast(p.name+' sepete eklendi');
}

async function checkSellerLinkAuth(){
  document.querySelectorAll('a[href="satici-paneli.html"]').forEach(link=>{
    link.addEventListener('click',async function(evt){
      if(localStorage.getItem(AUTH_STORAGE_KEY)==='true')return;
      evt.preventDefault();
      const email=prompt('Satıcı girişi için e-posta girin:');
      const password=prompt('Şifre girin:');
      if(!email||!password){alert('E-posta ve şifre gerekli.');return;}
      try{
        const res = await fetch('/api/seller/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
        const data = await res.json();
        if(data.success){localStorage.setItem(AUTH_STORAGE_KEY,'true');window.location.href='satici-paneli.html';}
        else{alert(data.error||'Hatalı giriş.');}
      }catch(err){console.error(err);alert('Sunucuya bağlanılamadı.');}
    });
  });
}

async function loadSliderImages() {
  try {
    const res = await fetch('http://localhost:3000/api/slider/kampanyalar');
    const data = await res.json();
    if (data.success && data.slider) {
      const images = document.querySelectorAll('.slider img');
      const urls = [data.slider.image_url_1, data.slider.image_url_2, data.slider.image_url_3];
      images.forEach((img, i) => {
        if (urls[i]) img.src = urls[i];
      });
    }
  } catch (err) {
    console.log('Slider resimleri yüklenemedi:', err);
  }
}

renderProductGrid(pageProducts);
updateCartCount();
checkSellerLinkAuth();
loadSliderImages();
</script>
<script src="assets/commerce.js"></script>
<script src="assets/site-settings.js"></script>
</body>
</html>
