<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

h1,h2,h3,h4,h5,h6{
  font-family:'Playfair Display',serif;
  color:#f1e6d8;
}

body{
  background:#0f0f0f;
  color:#eee;
}

/* HEADER */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 60px;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(12px);
  border-bottom:2px solid rgba(212,175,55,0.3);
}

.logo{
  font-size:32px;
  color:#D4AF37;
}

/* NAV */
nav{
  display:flex;
  align-items:center;
  gap:20px;
}

nav a{
  text-decoration:none;
  color:#ddd;
  transition:0.3s;
}

nav a:hover{
  color:#D4AF37;
}

/* Sepet + Telefon */
.cart-phone{
  display:flex;
  align-items:center;
  gap:15px;
}

.cart-btn{
  position:relative;
  color:#D4AF37;
  cursor:pointer;
}

.cart-count{
  position:absolute;
  top:-8px;
  right:-12px;
  background:red;
  color:#fff;
  border-radius:50%;
  padding:3px 7px;
  font-size:12px;
}

.cart-count.bump{
  transform:scale(1.4);
  transition:0.2s;
}

/* SEARCH */
.search{
  padding:10px 20px;
  border-radius:25px;
  border:1px solid #444;
  background:rgba(0,0,0,0.6);
  color:#eee;
  display:block;
  margin:20px auto;
}

/* 🔥 SLIDER */
.banner{
  position:relative;
  width:90%;
  margin:60px auto;
  height:350px;
  border-radius:20px;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 25px 60px rgba(0,0,0,0.7);
}

.slider{
  position:absolute;
  width:100%;
  height:100%;
}

.slider img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:1s;
}

.slider img.active{
  opacity:1;
}

.banner::after{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.5);
}

.banner-text{
  position:relative;
  font-size:42px;
  z-index:2;
  color:#fff;
}

.banner span{
  color:#D4AF37;
}

/* İLETİŞİM */
.contact-section{
  width:80%;
  margin:60px auto;
  padding:40px;
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  backdrop-filter:blur(10px);
  border:1px solid rgba(212,175,55,0.2);
}

.contact-section h1{
  font-size:40px;
  color:#D4AF37;
  text-align:center;
  margin-bottom:30px;
}

.contact-info{
  display:flex;
  flex-direction:column;
  gap:20px;
  font-size:18px;
}

.contact-info div{
  background:rgba(212,175,55,0.05);
  padding:15px;
  border-radius:12px;
}

/* FORM */
.contact-form{
  margin-top:40px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.contact-form input,
.contact-form textarea{
  padding:15px;
  border-radius:15px;
  border:1px solid rgba(212,175,55,0.2);
  background:rgba(0,0,0,0.6);
  color:#eee;
}

.contact-form button{
  background:linear-gradient(45deg,#D4AF37,#ffaa00);
  border:none;
  padding:15px;
  border-radius:30px;
  cursor:pointer;
}

/* FOOTER */
footer{
  margin-top:80px;
  padding:40px;
  text-align:center;
  background:#080808;
}

</style>
</head>

<body>

<header>
  <div class="logo">Herbolife</div>

  <nav>
    <a href="index.html">Ana Sayfa</a>
    <a href="urunler.html">Ürünler</a>
    <a href="kampanyalar.html">Kampanyalar</a>
    <a href="hakkimizda.html">Hakkımızda</a>
    <a href="iletisim.html">İletişim</a>
    <a href="satici-paneli.html">Satıcı Panelim</a>

    <!-- Sepet ve Telefon -->
    <div class="cart-phone">
      <a href="sepetim.html" class="cart-btn">
        🛒 <span class="cart-count" id="cartCount">0</span>
      </a>
      <span style="color:#D4AF37; font-weight:600;">📞 90 555 123 45 67</span>
    </div>
  </nav>
</header>

<input class="search" type="text" placeholder="Ürün ara...">

<!-- 🔥 SLIDER -->
<div class="banner">
  <div class="slider">
    <img src="https://picsum.photos/900/400?31" class="active">
    <img src="https://picsum.photos/900/400?32">
    <img src="https://picsum.photos/900/400?33">
  </div>

  <div class="banner-text">
    Bizimle <span>İletişime Geç</span>
  </div>
</div>

<div class="contact-section">
<h1>İletişim</h1>

<div class="contact-info">
  <div><strong>Adres:</strong> Bursa, Türkiye</div>
  <div><strong>Telefon:</strong> +90 555 123 45 67</div>
  <div><strong>Email:</strong> ornek@mail.com</div>
</div>

<form class="contact-form">
  <input type="text" placeholder="Adınız Soyadınız" required>
  <input type="email" placeholder="Email Adresiniz" required>
  <textarea rows="6" placeholder="Mesajınız..." required></textarea>
  <button type="submit">Gönder</button>
</form>
</div>

<footer>
© 2026 Herbolife. Tüm hakları saklıdır.
</footer>

<script>
// SLIDER
let slides = document.querySelectorAll(".slider img");
let index = 0;

setInterval(() => {
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}, 3000);

// Sepet Sayısı
function updateCartCount(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let el = document.getElementById("cartCount");
  el.innerText = cart.length;
  el.classList.add("bump");
  setTimeout(()=> el.classList.remove("bump"),200);
}
updateCartCount();

const AUTH_EMAIL = 'ornek@mail.com';
const AUTH_PASSWORD = 'sifre123';
const AUTH_STORAGE_KEY = 'sp_seller_auth';

function checkSellerLinkAuth() {
  const links = document.querySelectorAll('a[href="satici-paneli.html"]');
  links.forEach(link => {
    link.addEventListener('click', function(evt) {
      if (localStorage.getItem(AUTH_STORAGE_KEY) === 'true') return;
      evt.preventDefault();
      const email = prompt('Satıcı girişi için e-posta girin:');
      const password = prompt('Şifre girin:');
      if (email === AUTH_EMAIL && password === AUTH_PASSWORD) {
        localStorage.setItem(AUTH_STORAGE_KEY, 'true');
        window.location.href = 'satici-paneli.html';
      } else {
        alert('E-posta veya şifre hatalı. Giriş başarısız.');
      }
    });
  });
}
checkSellerLinkAuth();

</script>

</body>
</html>
