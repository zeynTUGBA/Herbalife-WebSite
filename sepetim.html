<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Herbalife - Sepetim</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/commerce.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f0f0f;color:#eee;}

header{
    display:flex;justify-content:space-between;align-items:center;
    padding:20px 60px;background:rgba(0,0,0,0.75);
    border-bottom:2px solid rgba(15,157,88,0.25);
}

.logo{font-size:28px;color:#0F9D58;}

nav a{color:#ddd;text-decoration:none;margin-left:15px;}
nav a:hover{color:#0F9D58;}

.container{width:90%;max-width:900px;margin:40px auto;}

h1{text-align:center;color:#0F9D58;margin-bottom:20px;}

.cart-item{
    display:flex;align-items:center;gap:15px;
    background:#111;border:1px solid rgba(15,157,88,0.08);
    padding:12px;border-radius:12px;margin-bottom:10px;
}

.cart-item img{width:60px;height:60px;object-fit:cover;border-radius:10px;}

.total{text-align:right;color:#0F9D58;font-size:20px;margin:20px 0;font-weight:700;}

.checkout-card{
    background:#111;padding:20px;border-radius:14px;
    border:1px solid rgba(15,157,88,0.12);
}

checkout-card h3{
    color:#0F9D58;margin-bottom:16px;font-size:18px;
}

input,textarea{
    width:100%;padding:10px;margin-top:6px;margin-bottom:12px;
    background:#0f0f0f;color:#fff;
    border:1px solid #333;border-radius:10px;
    font-family:'Poppins',sans-serif;
}

input:focus,textarea:focus{
    outline:none;border-color:rgba(15,157,88,0.45);
}

button{
    width:100%;padding:12px;margin-top:10px;
    border:none;border-radius:10px;cursor:pointer;
    font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;
}

.btn-pay{background:#0F9D58;color:#000;}
.btn-pay:hover{background:#0e8e4e;}
.btn-clear{background:#E24B4A;color:#fff;margin-top:8px;}
.btn-clear:hover{background:#c73b3a;}

.empty-cart{
    text-align:center;color:#aaa;padding:60px 0;
    font-size:16px;
}

.empty-cart div{font-size:48px;margin-bottom:12px;}

#toast{
    position:fixed;top:20px;right:20px;
    background:#111;color:#fff;
    padding:12px 20px;border-radius:10px;
    border:1px solid rgba(15,157,88,0.25);
    opacity:0;transform:translateY(-10px);transition:.3s;
    z-index:99999;
}
#toast.show{opacity:1;transform:translateY(0);}

/* PAYTR MODAL */
.paytr-modal{
    position:fixed;inset:0;
    background:rgba(0,0,0,0.88);
    display:flex;align-items:center;justify-content:center;
    z-index:99998;
}

.paytr-modal-inner{
    position:relative;
    width:90%;
    max-width:500px;
}

.paytr-modal-close{
    position:absolute;
    top:-40px;right:0;
    background:none;border:none;
    color:#fff;font-size:26px;
    cursor:pointer;width:auto;padding:0;
}

.paytr-modal-close:hover{color:#0F9D58;}

.paytr-modal iframe{
    width:100%;height:620px;
    border:none;border-radius:14px;
    background:#fff;
}

.loading-spinner{
    text-align:center;padding:40px;color:#0F9D58;
}
</style>
</head>

<body>

<header>
    <div class="logo">Herbalife</div>
    <nav>
        <a href="index.html">Ana Sayfa</a>
        <a href="urunler.html">Ürünler</a>
        <a href="kampanyalar.html">Kampanyalar</a>
        <a href="hakkimizda.html">Hakkımızda</a>
        <a href="iletisim.html">İletişim</a>
        <a href="satici-paneli.html">Satıcı Panelim</a>
    </nav>
</header>

<div class="container">
    <h1>🛒 Sepetim</h1>

    <div id="cartItems"></div>
    <div class="total" id="totalPrice"></div>

    <div class="checkout-card" id="checkoutCard" style="display:none;">
        <h3>Teslimat Bilgileri</h3>

        <input id="name" type="text" placeholder="Ad Soyad" required>
        <input id="email" type="email" placeholder="E-posta" required>
        <input id="phone" type="tel" placeholder="Telefon (05XX XXX XX XX)" required>
        <textarea id="address" rows="3" placeholder="Teslimat Adresi" required></textarea>

        <button class="btn-pay" onclick="checkout()">💳 ÖDEMEYE GİT</button>
        <button class="btn-clear" onclick="clearCart()">🗑️ Sepeti Temizle</button>
    </div>
</div>

<div id="toast"></div>

<script>
const API = "http://localhost:3000";

function toast(t){
    let el = document.getElementById("toast");
    el.innerText = t;
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 2500);
}

function getCart(){
    try {
        return JSON.parse(localStorage.getItem("cart") || "[]");
    } catch(e) {
        return [];
    }
}

function saveCart(c){
    localStorage.setItem("cart", JSON.stringify(c));
}

function loadCart(){
    let cart = getCart();
    let box = document.getElementById("cartItems");
    let checkoutCard = document.getElementById("checkoutCard");
    let total = 0;

    if(cart.length === 0){
        box.innerHTML = `
            <div class="empty-cart">
                <div>🛒</div>
                <p>Sepetiniz boş</p>
                <a href="urunler.html" style="color:#0F9D58;text-decoration:none;margin-top:12px;display:inline-block;">
                    Alışverişe Başla →
                </a>
            </div>`;
        document.getElementById("totalPrice").innerText = "";
        checkoutCard.style.display = "none";
        return;
    }

    checkoutCard.style.display = "block";

    box.innerHTML = cart.map((p, i) => {
        const price = parseFloat(p.price) || 0;
        total += price;

        const colorsHtml = (p.colors && p.colors.length)
            ? `<div style="display:flex;gap:4px;margin-top:4px;">
                ${p.colors.map(c => `<span style="width:12px;height:12px;border-radius:50%;background:${c.hex};border:1px solid rgba(255,255,255,0.2);display:inline-block;" title="${c.name}"></span>`).join('')}
               </div>`
            : '';

        return `
        <div class="cart-item">
            ${p.img ? `<img src="${p.img}" onerror="this.style.display='none'">` : `<div style="width:60px;height:60px;background:#1a1a1a;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;">📦</div>`}
            <div style="flex:1">
                <div style="font-weight:600;">${p.name}</div>
                <div style="color:#0F9D58;margin-top:2px;">₺${price.toLocaleString('tr-TR')}</div>
                ${colorsHtml}
            </div>
            <button onclick="removeItem(${i})"
                style="width:auto;padding:8px 14px;background:#E24B4A;color:#fff;border-radius:10px;border:none;cursor:pointer;font-size:13px;">
                Sil
            </button>
        </div>`;
    }).join("");

    document.getElementById("totalPrice").innerText =
        "Toplam: ₺" + total.toLocaleString("tr-TR");
}

function removeItem(i){
    let cart = getCart();
    cart.splice(i, 1);
    saveCart(cart);
    loadCart();
    toast("Ürün sepetten çıkarıldı");
}

function clearCart(){
    if(!confirm("Sepeti temizlemek istediğinize emin misiniz?")) return;
    localStorage.removeItem("cart");
    loadCart();
    toast("Sepet temizlendi");
}

async function checkout(){
    let cart = getCart();

    if(cart.length === 0){
        return toast("Sepet boş!");
    }

    let name    = document.getElementById("name").value.trim();
    let email   = document.getElementById("email").value.trim();
    let phone   = document.getElementById("phone").value.trim();
    let address = document.getElementById("address").value.trim();

    if(!name || !email || !phone || !address){
        return toast("Tüm alanlar zorunlu!");
    }

    // quantity yoksa 1 ekle
    const cartWithQty = cart.map(item => ({
        ...item,
        quantity: item.quantity || 1
    }));

    // Butonu devre dışı bırak
    const btn = document.querySelector(".btn-pay");
    btn.innerText = "⏳ İşleniyor...";
    btn.disabled = true;

    try {
        const res = await fetch(API + "/pay", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                cart: cartWithQty,
                customer: { name, email, phone, address }
            })
        });

        const data = await res.json();

        if(!data.success || !data.iframe_link){
            console.error("PayTR hatası:", data);
            toast("Ödeme başlatılamadı: " + (data.reason || "Sunucu hatası"));
            btn.innerText = "💳 ÖDEMEYE GİT";
            btn.disabled = false;
            return;
        }

        // PayTR iframe modalı göster
        openPaytrModal(data.iframe_link);

    } catch(e) {
        console.error(e);
        toast("Sunucu bağlantı hatası! (localhost:3000 çalışıyor mu?)");
    }

    btn.innerText = "💳 ÖDEMEYE GİT";
    btn.disabled = false;
}

function openPaytrModal(iframeLink){
    // Varsa eski modalı kaldır
    const existing = document.getElementById("paytrModal");
    if(existing) existing.remove();

    const modal = document.createElement("div");
    modal.id = "paytrModal";
    modal.className = "paytr-modal";
    modal.innerHTML = `
        <div class="paytr-modal-inner">
            <button class="paytr-modal-close" onclick="closePaytrModal()">✕</button>
            <div class="loading-spinner" id="paytrLoading">
                <div style="font-size:32px;">⏳</div>
                <p style="margin-top:8px;">Ödeme sayfası yükleniyor...</p>
            </div>
            <iframe
                src="${iframeLink}"
                id="paytrIframe"
                style="display:none;"
                onload="document.getElementById('paytrLoading').style.display='none'; this.style.display='block';">
            </iframe>
        </div>
    `;

    // Modal dışına tıklanınca kapat
    modal.addEventListener("click", function(e){
        if(e.target === modal) closePaytrModal();
    });

    document.body.appendChild(modal);
}

function closePaytrModal(){
    const modal = document.getElementById("paytrModal");
    if(modal) modal.remove();
}

// PayTR'dan başarı/başarısız mesajı dinle
window.addEventListener("message", function(e){
    if(e.data === "paytr_payment_success"){
        closePaytrModal();
        localStorage.removeItem("cart");
        loadCart();
        toast("✅ Ödeme başarılı! Teşekkürler.");
    } else if(e.data === "paytr_payment_failed"){
        closePaytrModal();
        toast("❌ Ödeme başarısız. Lütfen tekrar deneyin.");
    }
});

loadCart();
</script>

<script src="assets/commerce.js"></script>
<script src="assets/site-settings.js"></script>
</body>
</html>
